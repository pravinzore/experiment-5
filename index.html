<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Suggestion - Welcome pravin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 50px;
    }
    #searchBox {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }
    #suggestions {
      border: 1px solid #ccc;
      max-width: 300px;
      margin-top: 5px;
      background: #fff;
      position: absolute;
    }
    #suggestions div {
      padding: 8px;
      cursor: pointer;
    }
    #suggestions div:hover {
      background: #f0f0f0;
    }
  </style>
  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
  <h1>Welcome pravin</h1>
  <input type="text" id="searchBox" placeholder="Type to search...">
  <div id="suggestions"></div>

  <script>
    $(document).ready(function(){
      $("#searchBox").on("keyup", function(){
        let query = $(this).val();

        if(query.length > 1){
          // AJAX request to fetch suggestions
          $.ajax({
            url: "https://api.datamuse.com/sug?s=" + query, // Example API
            method: "GET",
            success: function(data){
              $("#suggestions").empty();
              // Display top 5 suggestions
              data.slice(0,5).forEach(function(item){
                $("#suggestions").append("<div class='suggestion-item'>" + item.word + "</div>");
              });
            }
          });
        } else {
          $("#suggestions").empty();
        }
      });

      // Handle click on suggestion
      $(document).on("click", ".suggestion-item", function(){
        $("#searchBox").val($(this).text());
        $("#suggestions").empty();
      });
    });
  </script>
</body>
</html>
